<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Meta tags for SEO & Google AdSense optimization -->
    <title>Modern Tic Tac Toe - Free Online Two-Player Game</title>
    <meta name="description" content="Play a beautiful, modern, and highly responsive Tic Tac Toe game online. Features automatic winner detection, glassmorphism design, neon glows, scoreboards, and instant restarts. Free, lightweight, and perfect for all devices.">
    <meta name="keywords" content="tic tac toe, play tic tac toe, free game, online game, two player game, glassmorphism, mobile game, responsive puzzle">
    <meta name="author" content="Tic Tac Toe Premium">
    
    <!-- Premium Google Fonts for modern design -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- Link to external stylesheet -->
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <!-- Floating background decorative circles -->
    <div class="background-decorations" aria-hidden="true">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
        <div class="circle circle-3"></div>
    </div>

    <!-- Main Container -->
    <main class="container">
        <!-- Game Header Section -->
        <header class="game-header">
            <h1 class="game-title">TIC TAC TOE</h1>
            <p class="game-subtitle">A modern, elegant two-player classic</p>
        </header>

        <!-- Glassmorphism-inspired Game Card -->
        <section class="game-card">
            <!-- Dynamic Scoreboard -->
            <div class="scoreboard" aria-label="Scoreboard">
                <div class="score-box player-x-box active" id="player-x-indicator">
                    <span class="player-label">Player X</span>
                    <span class="score" id="score-x">0</span>
                </div>
                <div class="score-divider" aria-hidden="true">VS</div>
                <div class="score-box player-o-box" id="player-o-indicator">
                    <span class="player-label">Player O</span>
                    <span class="score" id="score-o">0</span>
                </div>
            </div>

            <!-- Dynamic Turn Status Message -->
            <div class="status-container">
                <p id="game-status" class="turn-x" aria-live="polite">Player <span class="current-player">X</span>'s Turn</p>
            </div>

            <!-- 3x3 Game Grid Board -->
            <div class="board" id="board" role="grid" aria-label="Tic Tac Toe Board">
                <button class="cell" data-index="0" role="gridcell" aria-label="Cell 1, Empty"></button>
                <button class="cell" data-index="1" role="gridcell" aria-label="Cell 2, Empty"></button>
                <button class="cell" data-index="2" role="gridcell" aria-label="Cell 3, Empty"></button>
                <button class="cell" data-index="3" role="gridcell" aria-label="Cell 4, Empty"></button>
                <button class="cell" data-index="4" role="gridcell" aria-label="Cell 5, Empty"></button>
                <button class="cell" data-index="5" role="gridcell" aria-label="Cell 6, Empty"></button>
                <button class="cell" data-index="6" role="gridcell" aria-label="Cell 7, Empty"></button>
                <button class="cell" data-index="7" role="gridcell" aria-label="Cell 8, Empty"></button>
                <button class="cell" data-index="8" role="gridcell" aria-label="Cell 9, Empty"></button>
            </div>

            <!-- Interactive Game Controls -->
            <div class="controls-container">
                <button id="btn-restart" class="btn btn-primary" aria-label="Restart current round">
                    <!-- SVG Reset/Restart Icon -->
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="icon-restart" aria-hidden="true">
                        <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
                        <path d="M3 3v5h5"/>
                    </svg>
                    Restart Round
                </button>
                <button id="btn-reset" class="btn btn-secondary" aria-label="Reset score counter and round">
                    Reset Scores
                </button>
            </div>
        </section>

        <!-- Dynamic Modal Overlay for Winners / Draws -->
        <div class="overlay" id="winner-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
            <div class="modal">
                <div class="modal-decor" aria-hidden="true">
                    <span class="confetti-emoji">🎉</span>
                </div>
                <h2 class="modal-title" id="modal-title">Winner!</h2>
                <p class="modal-message" id="modal-message">Player X dominates the grid!</p>
                <button id="btn-modal-close" class="btn btn-primary" aria-label="Play another round">Play Again</button>
            </div>
        </div>

        <!-- Google AdSense Friendly Ad Space & Footer -->
        <footer class="game-footer">
            <p>Enjoying the game? Bookmark & share it with friends!</p>
            
            <!-- Standard Google AdSense Banner Placeholder -->
            <div class="adsense-placeholder" aria-label="Sponsored Advertisement">
                <span>Advertisement Placeholder</span>
            </div>
            
            <p class="copyright">&copy; 2026 Tic Tac Toe Premium. Built with modern web standards.</p>
        </footer>
    </main>

    <!-- Vanilla Javascript Logic -->
    <script type="module" src="/script.js"></script>
</body>
</html>
